spring:
  application:
    name: codenova-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

# Security Configuration Custom Attributes
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours in ms
  refresh-expiration: 604800000 # 7 days in ms

gemini:
  api:
    key: ${GEMINI_API_KEY:}

openrouter:
  api:
    key: ${OPENROUTER_API_KEY:}
  models: ${OPENROUTER_MODELS:deepseek/deepseek-r1:free,qwen/qwen-2.5-72b-instruct:free,meta-llama/llama-3.3-70b-instruct:free}
  temperature: 0.7

cors:
  allowed-origins: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    root: INFO
    com.codenova.ai: DEBUG
    org.hibernate.SQL: ERROR
    org.hibernate.type.descriptor.sql.BasicBinder: ERROR
